# Supabase project config. Generated during `supabase init`; kept here so
# future engineers can `supabase start` locally against the same shape.
# See: https://supabase.com/docs/reference/cli/config

project_id = "barbrawl"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "barbrawl://"
additional_redirect_urls = ["barbrawl://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"
